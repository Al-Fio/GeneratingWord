                display.innerText = shuffled[index];
                index++;
            } else {
                display.innerText = "FINE!";
                // Reset automatico dopo un secondo
                setTimeout(() => {
                    shuffled = [...words].sort(() => Math.random() - 0.5);
                    index = 0;
                    display.innerText = "TOCCA PER RICOMINCIARE";
                }, 1000);
            }
        }

        // Impedisce il "rimbalzo" su iOS
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
